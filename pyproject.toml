[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
strict = false

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503"]
exclude = [".git", "__pycache__", ".venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_"]
addopts = "-v --tb=short"