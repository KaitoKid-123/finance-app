name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements.txt'

env:
  # Gitea Container Registry (thay Harbor)
  REGISTRY: gitea-http.platform-ops:3000
  IMAGE_NAME: team-finance/etl

jobs:
  test:
    name: Unit Tests & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv \
            --count --show-source --statistics

      - name: Type check with mypy
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70
        env:
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag from Git SHA
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          load: true

      - name: Push to Gitea Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-spark-apps:
    name: Update image tag in platform-dags
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout platform-dags repo
        uses: actions/checkout@v4
        with:
          repository: data-platform/platform-dags
          token: ${{ secrets.GITEA_BOT_TOKEN }}
          path: platform-dags

      - name: Update image tag in SparkApplication YAMLs
        run: |
          cd platform-dags
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          REGISTRY="${{ env.REGISTRY }}"
          NEW_IMAGE="${REGISTRY}/team-finance/etl:${IMAGE_TAG}"

          # Update SparkApp YAMLs trong dags/finance/spark-apps/
          find dags/finance/spark-apps/ -name "*.yaml" -exec \
            sed -i "s|image: ${REGISTRY}/team-finance/etl:.*|image: ${NEW_IMAGE}|g" {} \;

          if git diff --quiet; then
            echo "No image tag changes needed"
            exit 0
          fi

          git config user.email "ci-bot@platform.internal"
          git config user.name "CI Bot"
          git add dags/finance/spark-apps/
          git commit -m "chore(finance): update etl image to ${IMAGE_TAG} [ci skip]"
          git push
          echo "platform-dags updated with image tag: ${IMAGE_TAG}"
